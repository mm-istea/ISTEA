<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>E-commerce</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>E-commerce</h1>

  <input type="text" id="search" placeholder="Buscar productos...">

  <button id="cartBtn">🛒 (<span id="cartCount">0</span>)</button>
</header>

<main id="productContainer"></main>

<!-- MODAL PRODUCTO -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="closeModal">X</span>
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <p id="modalPrice"></p>
    <button id="addToCartBtn">Agregar al carrito</button>
  </div>
</div>

<!-- SIDEBAR CARRITO -->
<div id="sidebar" class="sidebar hidden">
  <h2>Carrito</h2>
  <div id="cartItems"></div>

  <button id="clearCart">Vaciar carrito</button>
</div>

<script src="app.js"></script>
</body>
</html>
